 <!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>منصة التوحيد</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>

<style>

body{
font-family:Tahoma;
background:#f4fff6;
padding:20px;
}

.card{
background:white;
padding:20px;
border-radius:15px;
box-shadow:0 0 10px rgba(0,0,0,.1);
margin:10px;
}

button{
background:#1b5e20;
color:white;
border:none;
padding:10px 20px;
border-radius:8px;
cursor:pointer;
}

</style>

</head>

<body>

<h1>منصة تحليل نتائج التوحيد</h1>

<div class="card">

<h2>رفع المنهج</h2>

<input type="file" id="pdfFile">

<button onclick="extractPDF()">استخراج الوحدات</button>

<div id="units"></div>

</div>

<div class="card">

<h2>الطالبات</h2>

<input id="studentName" placeholder="اسم الطالبة">

<button onclick="addStudent()">إضافة</button>

<ul id="studentsList"></ul>

</div>

<div class="card">

<h2>الدرجات</h2>

<select id="studentSelect"></select>

<input id="testScore" placeholder="اختبار من 60">

<input id="taskScore" placeholder="مهام من 40">

<button onclick="saveGrade()">حفظ</button>

</div>

<div class="card">

<h2>التحليل</h2>

<canvas id="chart"></canvas>

</div>

<script>

let data = JSON.parse(localStorage.getItem("platformData")) || {

students:[],
units:[],
grades:[]

};

function save(){

localStorage.setItem("platformData",JSON.stringify(data));

}

function renderStudents(){

let ul=document.getElementById("studentsList");
let select=document.getElementById("studentSelect");

ul.innerHTML="";
select.innerHTML="";

data.students.forEach(s=>{

let li=document.createElement("li");
li.innerText=s;

ul.appendChild(li);

let opt=document.createElement("option");
opt.value=s;
opt.innerText=s;

select.appendChild(opt);

});

}

function addStudent(){

let name=document.getElementById("studentName").value;

data.students.push(name);

save();

renderStudents();

}

async function extractPDF(){

let file=document.getElementById("pdfFile").files[0];

if(!file) return;

let pdf=await pdfjsLib.getDocument(URL.createObjectURL(file)).promise;

let text="";

for(let i=1;i<=pdf.numPages;i++){

let page=await pdf.getPage(i);

let content=await page.getTextContent();

content.items.forEach(item=>{

text+=item.str+" ";

});

}

let regex=/الوحدة\s+[^\n]+/g;

let units=text.match(regex) || [];

data.units=units;

save();

let div=document.getElementById("units");

div.innerHTML="";

units.forEach(u=>{

let p=document.createElement("p");
p.innerText=u;

div.appendChild(p);

});

}

function saveGrade(){

let student=document.getElementById("studentSelect").value;

let test=parseInt(document.getElementById("testScore").value||0);

let task=parseInt(document.getElementById("taskScore").value||0);

let total=test+task;

data.grades.push({student,total});

save();

renderChart();

}

function renderChart(){

let above=0;
let middle=0;
let below=0;

data.grades.forEach(g=>{

if(g.total>=85) above++;

else if(g.total>=60) middle++;

else below++;

});

new Chart(document.getElementById("chart"),{

type:"pie",

data:{

labels:["فوق المتوسط","ضمن المتوسط","دون المتوسط"],

datasets:[{

data:[above,middle,below],

backgroundColor:["green","orange","red"]

}]

}

});

}

renderStudents();
renderChart();

</script>

</body>
</html>
