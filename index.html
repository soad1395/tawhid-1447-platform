 <!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>منصة تحليل نتائج الطالبات</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
font-family:Tahoma;
background:#f2f4f7;
margin:0
}

header{
background:#0b5c4a;
color:white;
padding:20px;
text-align:center;
font-size:26px
}

nav{
display:flex;
flex-wrap:wrap;
gap:10px;
justify-content:center;
background:white;
padding:10px
}

button{
padding:10px 14px;
border:none;
background:#0b5c4a;
color:white;
border-radius:8px;
cursor:pointer
}

section{
display:none;
padding:20px
}

table{
width:100%;
border-collapse:collapse;
background:white
}

th,td{
border:1px solid #ddd;
padding:8px;
text-align:center
}

.home{
position:fixed;
top:10px;
left:10px
}

</style>
</head>

<body>

<header>
منصة تحليل نتائج الطالبات
</header>

<button class="home" onclick="showPage('home')">🏠 الرئيسية</button>

<nav>

<button onclick="showPage('home')">الرئيسية</button>
<button onclick="showPage('students')">الطالبات</button>
<button onclick="showPage('grades')">إدخال الدرجات</button>
<button onclick="showPage('analysis')">تحليل النتائج</button>
<button onclick="showPage('plans')">الخطط</button>
<button onclick="showPage('awards')">التكريم</button>
<button onclick="showPage('parents')">أولياء الأمور</button>
<button onclick="showPage('sources')">المصادر</button>
<button onclick="showPage('games')">الألعاب</button>

</nav>

<section id="home" style="display:block">

<h2>لوحة التحكم</h2>

<p>

1 إدخال أسماء الطالبات  
2 إدخال الدرجات  
3 عرض التحليل والخطط

</p>

</section>

<section id="students">

<h2>إدخال أسماء الطالبات</h2>

<textarea id="names" rows="6" style="width:100%"></textarea>

<button onclick="addStudents()">إضافة</button>

<table id="studentsTable"></table>

</section>

<section id="grades">

<h2>إدخال الدرجات</h2>

<table id="gradesTable"></table>

</section>

<section id="analysis">

<h2>تحليل النتائج</h2>

<canvas id="chart"></canvas>

<button onclick="analyze()">تحليل</button>

</section>

<section id="plans">

<h2>الخطط العلاجية والإثرائية</h2>

<div id="remedial"></div>
<div id="enrichment"></div>

</section>

<section id="awards">

<h2>التكريم</h2>

<div id="awardsList"></div>

</section>

<section id="parents">

<h2>متابعة أولياء الأمور</h2>

<textarea style="width:100%" rows="6"></textarea>

</section>

<section id="sources">

<h2>المصادر</h2>

<ul>

<li><a href="https://ien.edu.sa">عين</a></li>
<li><a href="https://schools.madrasati.sa">مدرستي</a></li>

</ul>

</section>

<section id="games">

<h2>الألعاب التعليمية</h2>

<ul>

<li><a href="https://wordwall.net">Wordwall</a></li>
<li><a href="https://kahoot.com">Kahoot</a></li>
<li><a href="https://quizizz.com">Quizizz</a></li>

</ul>

</section>

<script>

let students=[]

let skills=[

"تعريف التوحيد",
"توحيد الربوبية",
"توحيد الألوهية",
"الأسماء والصفات",
"الشرك",
"حقوق النبي",
"فضل التوحيد"

]

function showPage(id){

document.querySelectorAll("section").forEach(s=>s.style.display="none")

document.getElementById(id).style.display="block"

}

function addStudents(){

let text=document.getElementById("names").value

students=text.split("\n")

let table="<tr><th>الطالبة</th></tr>"

students.forEach(s=>{

table+=`<tr><td>${s}</td></tr>`

})

document.getElementById("studentsTable").innerHTML=table

generateGrades()

}

function generateGrades(){

let table="<tr><th>الطالبة</th>"

skills.forEach(skill=>{

table+=`<th>${skill}</th>`

})

table+="</tr>"

students.forEach((s,i)=>{

table+=`<tr><td>${s}</td>`

skills.forEach((skill,j)=>{

table+=`

<td>

<input type="number" id="g${i}_${j}" min="0" max="100">

</td>

`

})

table+="</tr>"

})

document.getElementById("gradesTable").innerHTML=table

}

function analyze(){

let high=0
let mid=0
let low=0

students.forEach((s,i)=>{

skills.forEach((skill,j)=>{

let g=document.getElementById(`g${i}_${j}`)

if(!g || g.value=="") return

let score=parseInt(g.value)

if(score>=90) high++
else if(score>=70) mid++
else low++

})

})

new Chart(document.getElementById("chart"),{

type:"pie",

data:{

labels:["فوق المتوسط","ضمن المتوسط","دون المتوسط"],

datasets:[{

data:[high,mid,low]

}]

}

})

generatePlans()
generateAwards()

}

function generatePlans(){

let remedial=[]
let enrichment=[]

students.forEach((s,i)=>{

skills.forEach((skill,j)=>{

let g=document.getElementById(`g${i}_${j}`)

if(!g || g.value=="") return

let score=parseInt(g.value)

if(score<70){

remedial.push(`${s} - ${skill}`)

}

if(score>=90){

enrichment.push(`${s} - ${skill}`)

}

})

})

document.getElementById("remedial").innerHTML="<h3>الخطة العلاجية</h3>"+remedial.join("<br>")

document.getElementById("enrichment").innerHTML="<h3>الخطة الإثرائية</h3>"+enrichment.join("<br>")

}

function generateAwards(){

let awards=[]

students.forEach((s,i)=>{

let total=0
let count=0

skills.forEach((skill,j)=>{

let g=document.getElementById(`g${i}_${j}`)

if(!g || g.value=="") return

total+=parseInt(g.value)
count++

})

if(count>0){

let avg=total/count

if(avg>=90){

awards.push(s)

}

}

})

document.getElementById("awardsList").innerHTML=awards.join("<br>")

}

</script>

</body>
</html>
