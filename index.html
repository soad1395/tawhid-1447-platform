 <!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>منصة تحليل نتائج التوحيد</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap" rel="stylesheet">

<style>

body{
font-family:'Tajawal',sans-serif;
background:#f0fdf4;
}

.card{
background:white;
padding:20px;
border-radius:16px;
box-shadow:0 5px 10px rgba(0,0,0,.05);
cursor:pointer;
transition:.2s;
text-align:center;
font-weight:bold;
}

.card:hover{
transform:scale(1.05)
}

.page{
display:none;
margin-top:30px
}

</style>

</head>

<body class="p-8">

<h1 class="text-3xl font-bold text-center mb-8">
منصة تحليل نتائج مادة التوحيد
</h1>


<div class="grid grid-cols-2 md:grid-cols-4 gap-6">

<div class="card" onclick="showPage('students')">👩‍🎓 الطالبات</div>

<div class="card" onclick="showPage('grades')">✍️ الدرجات</div>

<div class="card" onclick="showPage('analysis')">📊 التحليل</div>

<div class="card" onclick="showPage('games')">🎮 الألعاب</div>

<div class="card" onclick="showPage('resources')">📚 المصادر</div>

</div>



<!-- الطالبات -->

<div id="students" class="page">

<h2 class="text-xl font-bold mb-4">إضافة طالبة</h2>

<input id="studentName" placeholder="اسم الطالبة"
class="border p-2 rounded">

<button onclick="addStudent()"
class="bg-green-600 text-white px-4 py-2 rounded">
إضافة
</button>

<ul id="studentsList" class="mt-6 space-y-2"></ul>

</div>



<!-- الدرجات -->

<div id="grades" class="page">

<h2 class="text-xl font-bold mb-4">إدخال الدرجات</h2>

<select id="studentSelect" class="border p-2 rounded"></select>

<input id="scoreInput" type="number" placeholder="الدرجة"
class="border p-2 rounded">

<button onclick="addGrade()"
class="bg-blue-600 text-white px-4 py-2 rounded">
حفظ الدرجة
</button>

</div>



<!-- التحليل -->

<div id="analysis" class="page">

<h2 class="text-xl font-bold mb-4">التحليل الإحصائي</h2>

<canvas id="chart"></canvas>

</div>



<!-- الألعاب -->

<div id="games" class="page text-center">

<h2 class="text-xl font-bold mb-6">الألعاب التعليمية</h2>

<a href="https://kahoot.com" target="_blank">
<button class="bg-purple-600 text-white px-6 py-3 rounded m-2">
🎮 Kahoot
</button>
</a>

<a href="https://quizizz.com" target="_blank">
<button class="bg-green-600 text-white px-6 py-3 rounded m-2">
⚡ Quizizz
</button>
</a>

<a href="https://wordwall.net" target="_blank">
<button class="bg-yellow-500 text-black px-6 py-3 rounded m-2">
🧩 Wordwall
</button>
</a>

<a href="https://blooket.com" target="_blank">
<button class="bg-red-500 text-white px-6 py-3 rounded m-2">
🎯 Blooket
</button>
</a>

</div>



<!-- المصادر -->

<div id="resources" class="page text-center">

<h2 class="text-xl font-bold mb-6">المصادر التعليمية</h2>

<a href="https://ien.edu.sa" target="_blank">
<button class="bg-blue-600 text-white px-6 py-3 rounded m-2">
📚 منصة عين
</button>
</a>

<a href="https://schools.madrasati.sa" target="_blank">
<button class="bg-gray-800 text-white px-6 py-3 rounded m-2">
🏫 منصة مدرستي
</button>
</a>

<a href="https://ien.edu.sa/Books" target="_blank">
<button class="bg-cyan-600 text-white px-6 py-3 rounded m-2">
📖 الكتب الدراسية
</button>
</a>

</div>



<script>


function showPage(id){

document.querySelectorAll(".page").forEach(p=>{
p.style.display="none"
})

document.getElementById(id).style.display="block"

}



/* التخزين */

function saveData(key,data){
localStorage.setItem(key,JSON.stringify(data))
}

function loadData(key){
let d=localStorage.getItem(key)
return d?JSON.parse(d):[]
}



/* قواعد البيانات */

let students=loadData("students")
let grades=loadData("grades")



/* إضافة طالبة */

function addStudent(){

let name=document.getElementById("studentName").value

if(!name) return

students.push({name})

saveData("students",students)

renderStudents()

document.getElementById("studentName").value=""

}



/* عرض الطالبات */

function renderStudents(){

let list=document.getElementById("studentsList")

let select=document.getElementById("studentSelect")

list.innerHTML=""
select.innerHTML=""

students.forEach((s,i)=>{

list.innerHTML+=`<li>${s.name}</li>`

select.innerHTML+=`<option value="${i}">${s.name}</option>`

})

}



/* إضافة درجة */

function addGrade(){

let student=document.getElementById("studentSelect").value

let score=parseInt(document.getElementById("scoreInput").value)

grades.push({
student:student,
score:score
})

saveData("grades",grades)

calculateLevels()

}



/* التصنيف */

function classify(score){

if(score>=85) return "فوق المتوسط"

if(score>=60) return "ضمن المتوسط"

return "دون المتوسط"

}



/* التحليل */

function calculateLevels(){

let above=0
let middle=0
let below=0

grades.forEach(g=>{

let level=classify(g.score)

if(level==="فوق المتوسط") above++
else if(level==="ضمن المتوسط") middle++
else below++

})

let ctx=document.getElementById("chart")

if(!ctx) return

new Chart(ctx,{
type:"pie",
data:{
labels:["فوق المتوسط","ضمن المتوسط","دون المتوسط"],
datasets:[{
data:[above,middle,below],
backgroundColor:["#22c55e","#facc15","#ef4444"]
}]
}
})

}



renderStudents()
calculateLevels()

</script>

</body>
</html>
