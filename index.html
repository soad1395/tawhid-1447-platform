  <!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>منصة الإتقان الذكي</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
font-family:tahoma;
margin:0;
background:#f3f6fb
}

header{
background:#0f5132;
color:white;
text-align:center;
padding:20px;
font-size:28px
}

nav{
display:flex;
gap:10px;
flex-wrap:wrap;
justify-content:center;
padding:10px;
background:white
}

button{
padding:8px 14px;
border:none;
background:#0f5132;
color:white;
border-radius:6px;
cursor:pointer
}

section{
display:none;
padding:20px
}

table{
width:100%;
border-collapse:collapse;
background:white
}

th,td{
border:1px solid #ddd;
padding:8px;
text-align:center
}

.home{
position:fixed;
top:10px;
left:10px
}

</style>

</head>

<body>

<header>
منصة الإتقان الذكي
</header>

<button class="home" onclick="showPage('home')">🏠 الرئيسية</button>

<nav>

<button onclick="showPage('home')">الرئيسية</button>
<button onclick="showPage('class1')">ثاني ثانوي 1</button>
<button onclick="showPage('class2')">ثاني ثانوي 2</button>
<button onclick="showPage('class3')">ثاني ثانوي 3</button>
<button onclick="showPage('class4')">ثاني ثانوي 4</button>
<button onclick="showPage('class5')">ثاني ثانوي 5</button>

<button onclick="showPage('analysis')">التحليل</button>
<button onclick="showPage('games')">الألعاب</button>
<button onclick="showPage('sources')">المصادر</button>
<button onclick="showPage('quiz')">المسابقة</button>

</nav>

<section id="home" style="display:block">

<h2>ابدئي من هنا</h2>

<p>

1️⃣ أدخلي الطالبات للفصول  
2️⃣ سجلي التقييم  
3️⃣ افتحي التحليل

</p>

</section>

<!-- الفصول -->

<section id="class1">
<h2>ثاني ثانوي 1</h2>

<textarea id="students1" rows="6" style="width:100%"></textarea>
<button onclick="addStudents(1)">إضافة الطالبات</button>

<table id="table1"></table>

</section>

<section id="class2">
<h2>ثاني ثانوي 2</h2>

<textarea id="students2" rows="6" style="width:100%"></textarea>
<button onclick="addStudents(2)">إضافة الطالبات</button>

<table id="table2"></table>

</section>

<section id="class3">
<h2>ثاني ثانوي 3</h2>

<textarea id="students3" rows="6" style="width:100%"></textarea>
<button onclick="addStudents(3)">إضافة الطالبات</button>

<table id="table3"></table>

</section>

<section id="class4">
<h2>ثاني ثانوي 4</h2>

<textarea id="students4" rows="6" style="width:100%"></textarea>
<button onclick="addStudents(4)">إضافة الطالبات</button>

<table id="table4"></table>

</section>

<section id="class5">
<h2>ثاني ثانوي 5</h2>

<textarea id="students5" rows="6" style="width:100%"></textarea>
<button onclick="addStudents(5)">إضافة الطالبات</button>

<table id="table5"></table>

</section>

<!-- التحليل -->

<section id="analysis">

<h2>تحليل النتائج</h2>

<canvas id="chart"></canvas>

<button onclick="analyze()">تحليل</button>

</section>

<!-- الألعاب -->

<section id="games">

<h2>الألعاب</h2>

<ul>

<li><a href="https://wordwall.net" target="_blank">Wordwall</a></li>
<li><a href="https://kahoot.com" target="_blank">Kahoot</a></li>
<li><a href="https://quizizz.com" target="_blank">Quizizz</a></li>

</ul>

</section>

<!-- المصادر -->

<section id="sources">

<h2>المصادر</h2>

<ul>

<li><a href="https://ien.edu.sa" target="_blank">منصة عين</a></li>
<li><a href="https://schools.madrasati.sa" target="_blank">مدرستي</a></li>

</ul>

</section>

<!-- المسابقة -->

<section id="quiz">

<h2>مسابقة</h2>

<p>ما معنى التوحيد؟</p>

<button onclick="answer(true)">إفراد الله بالعبادة</button>
<button onclick="answer(false)">عبادة غير الله</button>

<div id="quizResult"></div>

</section>

<script>

let students = []

function showPage(id){

document.querySelectorAll("section").forEach(s=>s.style.display="none")

document.getElementById(id).style.display="block"

}

function addStudents(c){

let text = document.getElementById("students"+c).value

students = text.split("\n")

let table="<tr><th>الطالبة</th><th>التقييم</th></tr>"

students.forEach((s,i)=>{

table += `
<tr>
<td>${s}</td>
<td>
<select id="g${c}_${i}">
<option>فوق المتوسط</option>
<option>ضمن المتوسط</option>
<option>دون المتوسط</option>
</select>
</td>
</tr>
`

})

document.getElementById("table"+c).innerHTML = table

}

function analyze(){

let high=0
let mid=0
let low=0

document.querySelectorAll("select").forEach(s=>{

if(s.value=="فوق المتوسط") high++
if(s.value=="ضمن المتوسط") mid++
if(s.value=="دون المتوسط") low++

})

new Chart(document.getElementById("chart"),{

type:"pie",

data:{

labels:["فوق المتوسط","ضمن المتوسط","دون المتوسط"],

datasets:[{data:[high,mid,low]}]

}

})

}

function answer(correct){

let r=document.getElementById("quizResult")

if(correct){

r.innerHTML="😊 أحسنت"
r.style.color="green"

}else{

r.innerHTML="😢 إجابة خاطئة"
r.style.color="red"

}

}

</script>

</body>
</html>
